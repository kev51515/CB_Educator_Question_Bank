# =============================================================================
# CI — build + smoke
# =============================================================================
# Two jobs:
#   1. build:  type-check + vite build. No secrets needed. Fast, runs on
#              every push / PR / fork PR. Catches all source-level breaks.
#   2. smoke:  runs the full smoke pipeline (e2e + features + modules) against
#              the live Supabase Cloud project. Needs the three SUPABASE_*
#              secrets configured under repo Settings → Secrets and variables
#              → Actions. Does NOT run on fork PRs (no access to secrets).
#
# Each smoke suite cleans up after itself, but each run still hits the
# connected Supabase project — point CI at a development/demo project, not
# at one with real student data.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: viewer

jobs:
  build:
    name: Build (tsc + vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build
        run: npx vite build

  smoke:
    name: Smoke (e2e + features + modules)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    # Skip on PRs from forks — they can't see secrets and the job would
    # fail mid-run with a confusing "missing env" message. Pushes to main +
    # PRs from same-repo branches still run.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install
        run: npm ci

      - name: Run smoke pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run smoke
